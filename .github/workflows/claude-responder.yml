name: Claude Optimizer Responder

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  respond:
    runs-on: ubuntu-latest
    # Only run when the comment contains the custom trigger phrase, and never
    # when the comment was authored by a bot (prevents self-triggering loops).
    if: >-
      ${{ github.event.comment.user.type != 'Bot' &&
          contains(github.event.comment.body, '@claude-optimizer') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude-optimizer"
          # Same Opus model + tool permissions as the optimizer, so behaviour
          # and output format stay consistent. Opens draft PRs, never merges,
          # never deletes branches.
          claude_args: >-
            --model claude-opus-4-1-20250805
            --allowedTools "Bash,Read,Grep,Glob,Edit,Write,Bash(gh:*),Bash(git:*),Bash(npm:*)"
