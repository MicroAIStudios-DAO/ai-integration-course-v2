# Automatic preview deploys for pull requests.
name: Deploy Preview to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      # Firebase configuration - these are PUBLIC keys safe to expose in client bundle.
      # Vite reads VITE_* env vars; GitHub secret names retained as REACT_APP_* to avoid rotation.
      VITE_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY || 'AIzaSyDbkztazekIxE8KUB2MydZXLVW7p52CUOQ' }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN || 'ai-integra-course-v2.firebaseapp.com' }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID || 'ai-integra-course-v2' }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET || 'ai-integra-course-v2.firebasestorage.app' }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID || '313115890482' }}
      VITE_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID || '1:313115890482:web:cca32371be86c0863cbd2b' }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID || 'G-15SDDF1S5S' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ai-integra-course-v2
