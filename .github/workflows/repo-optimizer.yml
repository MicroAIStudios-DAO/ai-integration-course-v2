name: Repo Optimizer

on:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC
  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus area (branch-hygiene, security, performance, dead-code, dependencies, docs). Leave blank to use the daily rotation.'
        required: false
        default: ''

# Single-flight: never run two optimizer jobs at once
concurrency:
  group: repo-optimizer
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    # OFF SWITCH: scheduled runs only fire when the repo variable
    # OPTIMIZER_ENABLED is set to 'true'. Manual (workflow_dispatch)
    # runs always work, even while the daily automation is paused.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.OPTIMIZER_ENABLED == 'true' }}
    steps:
      - name: Checkout (full history for branch + diff analysis)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- Gather objective signals for the agent to reason over ---
      - name: Collect signals
        id: signals
        continue-on-error: true
        run: |
          mkdir -p .optimizer
          npm audit --json > .optimizer/audit.json 2>/dev/null || true
          npx eslint . -f json -o .optimizer/eslint.json || true
          # New code in the last 24h merged to main, for the daily review
          git log --since="24 hours ago" --pretty=format:'%H %an %s' origin/main > .optimizer/recent-commits.txt || true
          git diff "@{1 day ago}" origin/main --stat > .optimizer/recent-diff.txt 2>/dev/null || true
          # Branch inventory: which branches are merged into main vs not
          for b in $(git branch -r | grep -v 'origin/HEAD' | sed 's/origin\///'); do
            if git merge-base --is-ancestor origin/$b origin/main 2>/dev/null; then
              echo "MERGED   $b" >> .optimizer/branches.txt
            else
              echo "UNMERGED $b" >> .optimizer/branches.txt
            fi
          done

      # --- Decide today's focus (manual input wins; else day-of-year rotation) ---
      - name: Determine focus
        id: focus
        run: |
          INPUT="${{ github.event.inputs.focus }}"
          if [ -n "$INPUT" ]; then
            echo "area=$INPUT" >> "$GITHUB_OUTPUT"
          else
            # Rotation order: branch-hygiene first, then security, then the rest
            ROT=(branch-hygiene security performance dead-code dependencies docs)
            DOY=$(date -u +%j)
            IDX=$(( (10#$DOY) % ${#ROT[@]} ))
            echo "area=${ROT[$IDX]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude optimizer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: .github/optimizer-prompt.md
          # Pass context the prompt template reads:
          claude_args: >-
            --append-system-prompt "FOCUS_AREA=${{ steps.focus.outputs.area }}"
